name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust
        uses: dtolnay/rust-toolchain@stable
      - name: fmt
        run: cargo fmt --all -- --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust
        uses: dtolnay/rust-toolchain@stable
      - name: clippy
        run: cargo clippy --all --all-targets --locked
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust
        uses: dtolnay/rust-toolchain@stable
      - name: test
        run: cargo test -p broken-app --test integration
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: asan
        env:
          RUSTFLAGS: "-Zsanitizer=address"
        run: cargo test -p broken-app --test integration -Zbuild-std --target x86_64-unknown-linux-gnu
  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: tsan
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
        run: cargo test -p broken-app --test integration -Zbuild-std --target x86_64-unknown-linux-gnu
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: miri
        run: cargo miri test -p broken-app --test integration
  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rust
        uses: dtolnay/rust-toolchain@stable
      - name: install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind && cargo install cargo-valgrind
      - name: run
        env:
          VALGRIND_OPTS: "--leak-check=full --show-leak-kinds=definite"
        run: cargo valgrind test -p broken-app --test integration
